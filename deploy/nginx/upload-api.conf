# Nginx reverse proxy for MinIO Upload Service (FastAPI upstream).
# Upstream must match API_HOST_PORT in .env (default 29002).
#
# This file is HTTP-only so `nginx -t` passes BEFORE Let's Encrypt certs exist.
# After first deploy, run:  sudo certbot --nginx -d upload.1550plus.com
# Certbot will add TLS (and usually a redirect from :80 → :443).
#
# Install:
#   sudo cp deploy/nginx/upload-api.conf /etc/nginx/sites-available/upload.1550plus.com
#   sudo ln -sf /etc/nginx/sites-available/upload.1550plus.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream upload_api {
    server 127.0.0.1:29002;
    keepalive 16;
}

# Must be unique across all sites on this server (change name if it clashes).
limit_req_zone $binary_remote_addr zone=upload_1550plus_rl:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name upload.1550plus.com;

    server_tokens off;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 50m;
    client_body_timeout 60s;

    location ~ ^/(docs|redoc|openapi\.json)$ {
        deny all;
        return 404;
    }

    location ~ ^/upload {
        limit_req zone=upload_1550plus_rl burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://upload_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        limit_req zone=upload_1550plus_rl burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://upload_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}
