# Nginx reverse proxy for MinIO Upload Service
# FastAPI on 127.0.0.1:${API_HOST_PORT:-6500} — set API_HOST_PORT in .env to match here.
#
# Install:
#   sudo cp deploy/nginx/upload-api.conf /etc/nginx/sites-available/upload.1550plus.com
#   sudo ln -s /etc/nginx/sites-available/upload.1550plus.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get a TLS cert:
#   sudo certbot --nginx -d upload.1550plus.com
#   sudo systemctl reload nginx

upstream upload_api {
    server 127.0.0.1:6500;  # must match API_HOST_PORT in .env
    keepalive 16;
}

# ── Rate-limit zone (per client IP) ──
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name upload.1550plus.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name upload.1550plus.com;

    # ── TLS (managed by certbot) ──
    ssl_certificate     /etc/letsencrypt/live/upload.1550plus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/upload.1550plus.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Modern ciphers (TLS 1.3 handles its own; 1.2 uses this list)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # HSTS — tell browsers to only use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Security headers ──
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Hide Nginx version
    server_tokens off;

    # Upload body limit (match MAX_FILE_SIZE_MB)
    client_max_body_size 50m;
    client_body_timeout 60s;

    # ── Block docs/redoc/openapi on the public internet ──
    location ~ ^/(docs|redoc|openapi\.json)$ {
        deny all;
        return 404;
    }

    # ── Upload endpoints: tighter rate limit ──
    location ~ ^/upload {
        limit_req zone=upload_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://upload_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Everything else ──
    location / {
        limit_req zone=upload_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://upload_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}
