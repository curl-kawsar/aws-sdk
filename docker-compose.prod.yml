# Production overlay.
# MinIO has no published ports (API reaches it over Docker internal network).
# The API binds to 0.0.0.0 on a high port; ufw blocks external access.
# Nginx proxies public 80/443 → localhost:29002.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    ports:
      - "${API_HOST_PORT:-29002}:8000"
