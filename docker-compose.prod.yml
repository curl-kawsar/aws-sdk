# Production overlay: bind API and MinIO to localhost only.
# Nginx on the host terminates TLS and proxies to 127.0.0.1:${API_HOST_PORT:-29002}.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Do not publish MinIO ports publicly; use the API only, or tunnel to MinIO console port for admin.

services:
  minio:
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT_S3:-29000}:9000"
      - "127.0.0.1:${MINIO_HOST_PORT_CONSOLE:-29001}:9001"

  api:
    ports:
      - "127.0.0.1:${API_HOST_PORT:-29002}:8000"
