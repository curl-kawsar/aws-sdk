services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "7100:9000"   # S3 API (host:container)
      - "7101:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: upload-api
    ports:
      - "6500:8000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
      MINIO_SECURE: "false"
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-}
      PERMANENT_DOWNLOAD_URLS: ${PERMANENT_DOWNLOAD_URLS:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      PRESIGNED_URL_EXPIRES_HOURS: ${PRESIGNED_URL_EXPIRES_HOURS:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      API_KEYS: ${API_KEYS:-}
      DISABLE_DOCS: ${DISABLE_DOCS:-true}
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio_data:
